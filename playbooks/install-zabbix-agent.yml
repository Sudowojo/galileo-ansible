---
# playbooks/install-zabbix-agent.yml
# Installs and configures Zabbix Agent 2 on RHEL/Ubuntu/Debian targets
# Server and ServerActive are passed as extra variables / AAP Survey at launch time

- name: Install and Configure Zabbix Agent 2
  hosts: all
  become: true

  vars:
    zabbix_version: "7.0"
    zabbix_listen_port: 10050
    zabbix_agent_timeout: 3
    zabbix_hostname: "{{ ansible_fqdn }}"
    zabbix_host_metadata: "{{ 'linux-rhel' if ansible_os_family == 'RedHat' else 'linux-ubuntu' }}"
    zabbix_host_interface: "{{ ansible_default_ipv4.address }}"
    zabbix_server: "192.168.250.20"
    zabbix_server_active: "192.168.250.20"

  tasks:

    # -------------------------------------------------------
    # Validate required variables
    # -------------------------------------------------------

    - name: Fail if zabbix_server is not defined
      ansible.builtin.fail:
        msg: "zabbix_server must be defined. Set it as an extra variable or via AAP Survey."
      when: zabbix_server is not defined or zabbix_server == ""

    # -------------------------------------------------------
    # RHEL / CentOS / Rocky / AlmaLinux
    # -------------------------------------------------------

    - name: Install Zabbix RPM repository (RHEL family)
      ansible.builtin.dnf:
        name: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/rhel/{{ ansible_distribution_major_version }}/x86_64/zabbix-release-latest-{{ zabbix_version }}.el{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: true
      when: ansible_os_family == "RedHat"

    - name: Install Zabbix Agent 2 (RHEL family)
      ansible.builtin.dnf:
        name: zabbix-agent2
        state: present
        update_cache: true
      when: ansible_os_family == "RedHat"

    # -------------------------------------------------------
    # Ubuntu / Debian
    # -------------------------------------------------------

    - name: Install prerequisites (Debian family)
      ansible.builtin.apt:
        name:
          - wget
          - gnupg
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Download Zabbix repository package (Ubuntu)
      ansible.builtin.get_url:
        url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu{{ ansible_distribution_version }}_all.deb"
        dest: /tmp/zabbix-release.deb
        mode: '0644'
      when:
        - ansible_os_family == "Debian"
        - ansible_distribution == "Ubuntu"

    - name: Download Zabbix repository package (Debian)
      ansible.builtin.get_url:
        url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/debian/pool/main/z/zabbix-release/zabbix-release_latest+debian{{ ansible_distribution_major_version }}_all.deb"
        dest: /tmp/zabbix-release.deb
        mode: '0644'
      when:
        - ansible_os_family == "Debian"
        - ansible_distribution == "Debian"

    - name: Install Zabbix repository package (Debian family)
      ansible.builtin.apt:
        deb: /tmp/zabbix-release.deb
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Zabbix Agent 2 (Debian family)
      ansible.builtin.apt:
        name: zabbix-agent2
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    # -------------------------------------------------------
    # Configure Zabbix Agent 2 (all platforms)
    # -------------------------------------------------------

    - name: Configure Zabbix Agent 2
      ansible.builtin.template:
        src: templates/zabbix_agent2.conf.j2
        dest: /etc/zabbix/zabbix_agent2.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart Zabbix Agent 2

    - name: Enable and start Zabbix Agent 2
      ansible.builtin.systemd:
        name: zabbix-agent2
        enabled: true
        state: started

    # -------------------------------------------------------
    # Firewall - firewalld (RHEL family)
    # -------------------------------------------------------

    - name: Check if firewalld is running (RHEL family)
      ansible.builtin.systemd:
        name: firewalld
      register: firewalld_status
      when: ansible_os_family == "RedHat"

    - name: Open Zabbix agent port in firewalld (RHEL family)
      ansible.posix.firewalld:
        port: "{{ zabbix_listen_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      when:
        - ansible_os_family == "RedHat"
        - firewalld_status.status.ActiveState == "active"

    # -------------------------------------------------------
    # Firewall - ufw (Debian/Ubuntu)
    # -------------------------------------------------------

    - name: Open Zabbix agent port in ufw (Debian family)
      community.general.ufw:
        rule: allow
        port: "{{ zabbix_listen_port }}"
        proto: tcp
      when: ansible_os_family == "Debian"

    # -------------------------------------------------------
    # Verify agent is running
    # -------------------------------------------------------

    - name: Verify Zabbix Agent 2 is running
      ansible.builtin.systemd:
        name: zabbix-agent2
      register: agent_status
      failed_when: agent_status.status.ActiveState != "active"

    - name: Report agent status
      ansible.builtin.debug:
        msg: "Zabbix Agent 2 is {{ agent_status.status.ActiveState }} on {{ ansible_fqdn }} ({{ ansible_default_ipv4.address }}) reporting to {{ zabbix_server }}"

  handlers:
    - name: Restart Zabbix Agent 2
      ansible.builtin.systemd:
        name: zabbix-agent2
        state: restarted