---
# extensions/eda/rulebooks/zabbix-webhook.yml
# Listens for incoming Zabbix webhook alerts and triggers remediation playbooks
# via Ansible Automation Platform Controller

- name: Listen for Zabbix Alerts
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5001

  rules:

    - name: Restart httpd
      condition: event.payload.playbook is defined and event.payload.playbook == "Restart httpd"
      action:
        run_job_template:
          name: "Restart httpd"
          organization: "Default"
          job_args:
            extra_vars:
              alert_host: "{{ event.payload.host_name }}"
              alert_name: "{{ event.payload.trigger_name }}"
              alert_severity: "{{ event.payload.trigger_severity }}"
              alert_event_id: "{{ event.payload.event_id }}"

    - name: Log unmatched events
      condition: event.payload is defined
      action:
        debug:
          msg: "Unmatched event from {{ event.payload.host_name }} - Trigger: {{ event.payload.trigger_name }} - Playbook tag: {{ event.payload.playbook | default('none') }}"